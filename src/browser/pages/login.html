<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no"
    />
    <meta
      http-equiv="Content-Security-Policy"
      content="style-src 'self'; script-src 'self' 'unsafe-inline'; manifest-src 'self'; img-src 'self' data:; font-src 'self' data:;"
    />
    <meta name="color-scheme" content="dark" />
    <title>Cloud Studio - Login</title>
    <link rel="icon" href="{{CS_STATIC_BASE}}/src/browser/media/favicon-dark-support.svg" />
    <link rel="alternate icon" href="{{CS_STATIC_BASE}}/src/browser/media/favicon.ico" />
    <link rel="manifest" href="{{BASE}}/manifest.json" crossorigin="use-credentials" />
    <link rel="apple-touch-icon" sizes="192x192" href="{{CS_STATIC_BASE}}/src/browser/media/pwa-icon-192.png" />
    <link rel="apple-touch-icon" sizes="512x512" href="{{CS_STATIC_BASE}}/src/browser/media/pwa-icon-512.png" />
    <link href="{{CS_STATIC_BASE}}/src/browser/pages/design-system.css" rel="stylesheet" />
    <link href="{{CS_STATIC_BASE}}/src/browser/pages/components.css" rel="stylesheet" />
    <link href="{{CS_STATIC_BASE}}/src/browser/pages/login.css" rel="stylesheet" />
    <meta id="coder-options" data-settings="{{OPTIONS}}" />
  </head>
  <body>
    <div class="cs-login-container">
      <!-- Animated background gradient -->
      <div class="cs-login-bg-gradient"></div>
      
      <!-- Animated background shapes -->
      <div class="cs-login-shapes">
        <div class="cs-shape cs-shape-1"></div>
        <div class="cs-shape cs-shape-2"></div>
        <div class="cs-shape cs-shape-3"></div>
      </div>

      <!-- Main login card -->
      <div class="cs-login-card">
        <!-- Logo -->
        <div class="cs-login-logo">
          <img src="{{CS_STATIC_BASE}}/src/browser/media/logo.svg" alt="Cloud Studio" />
        </div>

        <!-- Header -->
        <div class="cs-login-header">
          <h1 class="cs-login-title">Welcome to Cloud Studio</h1>
          <p class="cs-login-subtitle">Your premium cloud development environment</p>
        </div>

        <!-- Login form -->
        <form class="cs-login-form" method="post">
          <input class="cs-user-field" type="text" autocomplete="username" style="display: none" />
          <input id="base" type="hidden" name="base" value="{{BASE}}" />
          <input id="href" type="hidden" name="href" value="" />

          <!-- Password field -->
          <div class="cs-login-field">
            <label class="cs-login-label">Password</label>
            <div class="cs-input-with-icon cs-login-password-wrapper">
              <svg class="cs-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
              </svg>
              <input
                required
                autofocus
                class="cs-input cs-login-password"
                type="password"
                placeholder="Enter your password"
                name="password"
                autocomplete="current-password"
              />
              <button type="button" class="cs-password-toggle" aria-label="Toggle password visibility">
                <svg class="cs-icon-eye" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                  <circle cx="12" cy="12" r="3"></circle>
                </svg>
                <svg class="cs-icon-eye-off" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display: none">
                  <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
                  <line x1="1" y1="1" x2="23" y2="23"></line>
                </svg>
              </button>
            </div>
          </div>

          <!-- Submit button -->
          <button class="cs-btn cs-btn-primary cs-login-submit" type="submit">
            <span class="cs-submit-text">Sign In</span>
            <span class="cs-submit-loading" style="display: none">
              <svg class="cs-spinner" width="20" height="20" viewBox="0 0 24 24"></svg>
            </span>
          </button>

          <!-- Error message -->
          <div class="cs-login-error" id="error-message" style="display: none"></div>
        </form>

        <!-- Features -->
        <div class="cs-login-features">
          <div class="cs-feature">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="20 6 9 17 4 12"></polyline>
            </svg>
            <span>Instant Development Environment</span>
          </div>
          <div class="cs-feature">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="20 6 9 17 4 12"></polyline>
            </svg>
            <span>Full VS Code Integration</span>
          </div>
          <div class="cs-feature">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="20 6 9 17 4 12"></polyline>
            </svg>
            <span>Cloud-Powered Performance</span>
          </div>
        </div>

        <!-- Footer -->
        <div class="cs-login-footer">
          <p class="cs-login-footer-text">{{ PASSWORD_MSG }}</p>
        </div>
      </div>
    </div>

    <script>
      // Set href for cookie path
      const hrefInput = document.getElementById("href");
      if (hrefInput) {
        hrefInput.value = location.href;
      }

      // Password visibility toggle
      const passwordToggle = document.querySelector(".cs-password-toggle");
      const passwordInput = document.querySelector(".cs-login-password");
      const eyeIcon = document.querySelector(".cs-icon-eye");
      const eyeOffIcon = document.querySelector(".cs-icon-eye-off");

      if (passwordToggle) {
        passwordToggle.addEventListener("click", (e) => {
          e.preventDefault();
          const isPassword = passwordInput.type === "password";
          passwordInput.type = isPassword ? "text" : "password";
          eyeIcon.style.display = isPassword ? "none" : "block";
          eyeOffIcon.style.display = isPassword ? "block" : "none";
        });
      }

      // Form submission
      const form = document.querySelector(".cs-login-form");
      if (form) {
        form.addEventListener("submit", function (e) {
          const submitButton = document.querySelector(".cs-login-submit");
          const submitText = document.querySelector(".cs-submit-text");
          const submitLoading = document.querySelector(".cs-submit-loading");
          
          submitButton.disabled = true;
          submitText.style.display = "none";
          submitLoading.style.display = "inline-flex";
        });
      }

      // Display error if present
      const errorElement = document.querySelector(".cs-login-error");
      if (errorElement && "{{ERROR}}" && "{{ERROR}}" !== "") {
        errorElement.innerHTML = "{{ERROR}}";
        errorElement.style.display = "block";
      }
    </script>
  </body>
</html>
