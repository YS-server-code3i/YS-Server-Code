<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="color-scheme" content="dark" />
  <title>YS-Servece-Code - IDE</title>
  <link rel="icon" href="{{CS_STATIC_BASE}}/src/browser/media/favicon.svg" />
  <link rel="alternate icon" href="{{CS_STATIC_BASE}}/src/browser/media/favicon.ico" />
  <link rel="manifest" href="/manifest.json" crossorigin="use-credentials" />
  <link rel="apple-touch-icon" href="{{CS_STATIC_BASE}}/src/browser/media/logo.svg" />
  <link href="{{CS_STATIC_BASE}}/src/browser/pages/design-system.css" rel="stylesheet" />
  <link href="{{CS_STATIC_BASE}}/src/browser/pages/components.css" rel="stylesheet" />
  <link href="{{CS_STATIC_BASE}}/src/browser/pages/global.css" rel="stylesheet" />
  <link href="{{CS_STATIC_BASE}}/src/browser/pages/workspace.css" rel="stylesheet" />
  <link href="{{CS_STATIC_BASE}}/src/browser/pages/explorer.css" rel="stylesheet" />
  <link href="{{CS_STATIC_BASE}}/src/browser/pages/terminal.css" rel="stylesheet" />
  <link href="{{CS_STATIC_BASE}}/src/browser/pages/search.css" rel="stylesheet" />
  <link href="{{CS_STATIC_BASE}}/src/browser/pages/notifications.css" rel="stylesheet" />
  <link href="{{CS_STATIC_BASE}}/src/browser/pages/loading.css" rel="stylesheet" />
  <meta id="coder-options" data-settings="{{OPTIONS}}" />
</head>
<body>
  <div id="root" class="cs-workspace">
    <!-- Activity bar -->
    <div class="cs-activity-bar">
      <button class="cs-activity-item cs-active" title="Explorer" data-panel="explorer">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
          <polyline points="9 22 9 12 15 12 15 22"></polyline>
        </svg>
      </button>
      <button class="cs-activity-item" title="Search" data-panel="search">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"></circle>
          <path d="m21 21-4.35-4.35"></path>
        </svg>
      </button>
      <button class="cs-activity-item" title="Source Control" data-panel="scm">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="1"></circle>
          <path d="M12 1v6m0 6v6"></path>
          <path d="M4.22 4.22l4.24 4.24m5.08 0l4.24-4.24M4.22 19.78l4.24-4.24m5.08 0l4.24 4.24"></path>
        </svg>
      </button>
      <button class="cs-activity-item" title="Extensions" data-panel="extensions">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 2v6m0 4v6M2 12h6m4 0h6"></path>
        </svg>
      </button>
      <div style="flex: 1;"></div>
      <button class="cs-activity-item" title="Settings" data-panel="settings">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="3"></circle>
          <path d="M12 1v6m0 6v6M4.22 4.22l4.24 4.24m5.08 0l4.24-4.24M4.22 19.78l4.24-4.24m5.08 0l4.24 4.24"></path>
        </svg>
      </button>
    </div>

    <!-- Sidebar -->
    <div class="cs-sidebar">
      <div class="cs-sidebar-header">
        <h2 class="cs-sidebar-title">Explorer</h2>
        <button class="cs-sidebar-toggle" title="Toggle sidebar">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="15 18 9 12 15 6"></polyline>
          </svg>
        </button>
      </div>
      <div class="cs-sidebar-content">
        <div class="cs-explorer">
          <div class="cs-explorer-header">
            <div class="cs-input-with-icon cs-explorer-search">
              <svg class="cs-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="11" cy="11" r="8"></circle>
                <path d="m21 21-4.35-4.35"></path>
              </svg>
              <input class="cs-input" type="text" placeholder="Search files..." />
            </div>
          </div>
          <div class="cs-tree" id="file-tree">
            <div class="cs-tree-node">
              <div class="cs-tree-item cs-directory cs-selected">
                <div class="cs-tree-toggle cs-expanded">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M8 4h8v2H8V4zm0 4h16v2H8V8zm0 4h16v2H8v-2zm0 4h16v2H8v-2z"/></svg>
                </div>
                <div class="cs-tree-icon">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M10 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2h-8l-2-2z"/></svg>
                </div>
                <span class="cs-tree-label">Project</span>
              </div>
              <div class="cs-tree-children cs-expanded">
                <div class="cs-tree-node">
                  <div class="cs-tree-item cs-file">
                    <div class="cs-tree-toggle" style="visibility: hidden;"></div>
                    <div class="cs-tree-icon">📄</div>
                    <span class="cs-tree-label">README.md</span>
                  </div>
                </div>
                <div class="cs-tree-node">
                  <div class="cs-tree-item cs-file">
                    <div class="cs-tree-toggle" style="visibility: hidden;"></div>
                    <div class="cs-tree-icon">⚙️</div>
                    <span class="cs-tree-label">config.json</span>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Top navigation -->
    <div class="cs-topbar">
      <div class="cs-topbar-left">
        <img src="{{CS_STATIC_BASE}}/src/browser/media/logo.svg" alt="YS-Servece-Code" style="width: 24px; height: 24px;" />
        <h1 class="cs-topbar-title">YS-Servece-Code</h1>
      </div>
      <div class="cs-topbar-center">
        <button class="cs-btn cs-btn-ghost cs-btn-sm" title="Command Palette (Ctrl+K)">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"></circle>
            <path d="m21 21-4.35-4.35"></path>
          </svg>
          <span>Command Palette</span>
        </button>
      </div>
      <div class="cs-topbar-right">
        <button class="cs-btn-icon cs-btn-ghost" title="Notifications">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
            <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
          </svg>
        </button>
        <button class="cs-btn-icon cs-btn-ghost" title="Theme">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="5"></circle>
            <line x1="12" y1="1" x2="12" y2="3"></line>
            <line x1="12" y1="21" x2="12" y2="23"></line>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
            <line x1="1" y1="12" x2="3" y2="12"></line>
            <line x1="21" y1="12" x2="23" y2="12"></line>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
          </svg>
        </button>
      </div>
    </div>

    <!-- Main editor area -->
    <div class="cs-main">
      <div class="cs-tabs-bar" id="tabs-bar">
        <div class="cs-tab-item cs-active">
          <span>Welcome</span>
          <button class="cs-tab-close" title="Close">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="18" y1="6" x2="6" y2="18"></line>
              <line x1="6" y1="6" x2="18" y2="18"></line>
            </svg>
          </button>
        </div>
      </div>
      <div class="cs-editor-container">
        <div class="cs-editor">
          <div class="cs-editor-empty">
            <svg class="cs-editor-empty-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
              <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
            </svg>
            <p class="cs-editor-empty-text">Open a file to get started</p>
          </div>
        </div>
      </div>
    </div>

    <!-- Terminal -->
    <div class="cs-terminal-container">
      <div class="cs-terminal-header">
        <span class="cs-terminal-title">Terminal</span>
        <div class="cs-terminal-controls">
          <button class="cs-terminal-control" title="Split">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M3 12h18M3 6h18M3 18h18"></path>
            </svg>
          </button>
          <button class="cs-terminal-control" title="Minimize">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="5" y1="12" x2="19" y2="12"></line>
            </svg>
          </button>
        </div>
      </div>
      <div class="cs-terminal-content">
        <div class="cs-terminal-line">
          <span class="cs-terminal-prompt">$</span>
          <span class="cs-terminal-text">Welcome to YS-Servece-Code Terminal</span>
        </div>
        <div class="cs-terminal-line" style="margin-top: var(--cs-space-2);">
          <span class="cs-terminal-prompt">$</span>
          <span class="cs-terminal-text"></span>
        </div>
      </div>
    </div>
  </div>

  <!-- Toast notifications container -->
  <div class="cs-toast-container" id="toast-container"></div>

  <script>
    // Initialize workspace
    console.log('YS-Servece-Code IDE initialized');
    
    // Activity bar navigation
    document.querySelectorAll('.cs-activity-item').forEach(btn => {
      btn.addEventListener('click', function() {
        document.querySelectorAll('.cs-activity-item').forEach(b => b.classList.remove('cs-active'));
        this.classList.add('cs-active');
      });
    });
  </script>
</body>
</html>
