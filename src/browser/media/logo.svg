<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Cloud Studio Brain + Circuit Logo -->
  <defs>
    <linearGradient id="brainGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06B6D4;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="none" stroke="url(#brainGradient)" stroke-width="2" opacity="0.2"/>
  
  <!-- Brain left side -->
  <g filter="url(#shadow)">
    <path d="M 60 80 Q 50 75 45 85 Q 40 95 50 105 Q 60 100 60 90" fill="#1a1a1a" stroke="url(#brainGradient)" stroke-width="2" stroke-linejoin="round"/>
    <path d="M 65 75 Q 55 70 50 80 Q 45 90 55 100 Q 65 95 70 85" fill="#1a1a1a" stroke="url(#brainGradient)" stroke-width="2" stroke-linejoin="round"/>
    <path d="M 70 85 Q 60 80 55 90 Q 50 100 60 110 Q 70 105 75 95" fill="#1a1a1a" stroke="url(#brainGradient)" stroke-width="2" stroke-linejoin="round"/>
    <path d="M 75 80 Q 65 75 60 85 Q 55 95 65 105 Q 75 100 80 90" fill="#1a1a1a" stroke="url(#brainGradient)" stroke-width="2" stroke-linejoin="round"/>
  </g>
  
  <!-- Circuit board right side -->
  <g filter="url(#shadow)">
    <!-- Main circuit board body -->
    <rect x="105" y="75" width="45" height="50" rx="4" ry="4" fill="#1a1a1a" stroke="url(#brainGradient)" stroke-width="2"/>
    
    <!-- Connection lines -->
    <line x1="127" y1="75" x2="127" y2="55" stroke="url(#brainGradient)" stroke-width="2" stroke-linecap="round"/>
    <line x1="145" y1="85" x2="165" y2="75" stroke="url(#brainGradient)" stroke-width="2" stroke-linecap="round"/>
    <line x1="150" y1="125" x2="165" y2="145" stroke="url(#brainGradient)" stroke-width="2" stroke-linecap="round"/>
    <line x1="127" y1="125" x2="127" y2="145" stroke="url(#brainGradient)" stroke-width="2" stroke-linecap="round"/>
    <line x1="110" y1="100" x2="90" y2="100" stroke="url(#brainGradient)" stroke-width="2" stroke-linecap="round"/>
    
    <!-- Connection nodes -->
    <circle cx="127" cy="55" r="4" fill="url(#brainGradient)"/>
    <circle cx="165" cy="75" r="4" fill="url(#brainGradient)"/>
    <circle cx="165" cy="145" r="4" fill="url(#brainGradient)"/>
    <circle cx="127" cy="145" r="4" fill="url(#brainGradient)"/>
    <circle cx="90" cy="100" r="4" fill="url(#brainGradient)"/>
  </g>
</svg>